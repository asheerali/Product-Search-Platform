version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=product_search
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./pics:/app/pics
      - ./shared:/app/shared
    env_file:
      - .env
    environment:
      - PICS_DIR=/app/pics
      - SHARED_STORAGE_DIR=/app/shared
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/product_search
      - LLM_PROVIDER=xai
      - FRONTEND_ORIGIN=http://${PUBLIC_HOST:-localhost}:3000
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://${PUBLIC_HOST:-localhost}:8000
    depends_on:
      - backend

volumes:
  pg_data:
